services:
  pg_src:
    image: postgres:16
    container_name: nifi_demo_pg_src
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: rms_demo
    ports:
      - "5433:5432"
    volumes:
      - pg_src_data:/var/lib/postgresql/data
      - ./sql/bootstrap:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d rms_demo"]
      interval: 5s
      timeout: 3s
      retries: 30

  pg_dst:
    image: postgres:16
    container_name: nifi_demo_pg_dst
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: rms_demo
    ports:
      - "5434:5432"
    volumes:
      - pg_dst_data:/var/lib/postgresql/data
      - ./sql/bootstrap:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d rms_demo"]
      interval: 5s
      timeout: 3s
      retries: 30

  data_gen:
    build:
      context: ./data_gen
    container_name: nifi_demo_data_gen
    environment:
      SRC_PGHOST: pg_src
      SRC_PGPORT: "5432"
      SRC_PGDATABASE: rms_demo
      SRC_PGUSER: demo
      SRC_PGPASSWORD: demo

      DST_PGHOST: pg_dst
      DST_PGPORT: "5432"
      DST_PGDATABASE: rms_demo
      DST_PGUSER: demo
      DST_PGPASSWORD: demo

      DEMO_YEAR: "2026"
      ROOT_ROWS_PER_TABLE: "120"
      MAX_CHILD_ROWS: "5"
      FORCE_RECREATE: "false"
    depends_on:
      pg_src:
        condition: service_healthy
      pg_dst:
        condition: service_healthy
    restart: "no"

  nifi_registry:
    image: apache/nifi-registry:1.28.0
    container_name: nifi_demo_registry
    user: "0:0"
    ports:
      - "18080:18080"
    environment:
      NIFI_REGISTRY_WEB_HTTP_PORT: "18080"
    volumes:
      - nifi_registry_database:/opt/nifi-registry/nifi-registry-current/database
      - nifi_registry_flow_storage:/opt/nifi-registry/nifi-registry-current/flow_storage
    restart: unless-stopped
    networks:
      default:
        aliases:
          - nifi-registry

  nifi:
    build:
      context: ./nifi
      dockerfile: Dockerfile
    container_name: nifi_demo_nifi
    user: "0:0"
    ports:
      - "8080:8080"
    environment:
      NIFI_WEB_HTTP_PORT: "8080"
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: adminadminadmin
      NIFI_JVM_HEAP_INIT: 1g
      NIFI_JVM_HEAP_MAX: 2g
      JAVA_TOOL_OPTIONS: "-Dgrape.root=/opt/nifi/.groovy/grapes"
    volumes:
      - ./nifi/flows:/opt/demo/flows:ro
      - ./nifi/config:/opt/demo/config:ro
      - nifi_groovy_cache:/opt/nifi/.groovy
      - nifi_state:/opt/nifi/nifi-current/state
      - nifi_database:/opt/nifi/nifi-current/database_repository
      - nifi_flowfile:/opt/nifi/nifi-current/flowfile_repository
      - nifi_content:/opt/nifi/nifi-current/content_repository
      - nifi_provenance:/opt/nifi/nifi-current/provenance_repository
    depends_on:
      pg_src:
        condition: service_healthy
      pg_dst:
        condition: service_healthy
      nifi_registry:
        condition: service_started

volumes:
  pg_src_data:
  pg_dst_data:
  nifi_state:
  nifi_database:
  nifi_flowfile:
  nifi_content:
  nifi_provenance:
  nifi_registry_database:
  nifi_registry_flow_storage:
  nifi_groovy_cache: